<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Payment | Shopcart</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #e8f0f5 0%, #d4e2ea 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 2rem 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .payment-container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .brand-header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e3b2f, #2a5a46);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .payment-card {
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .book-preview {
            background: linear-gradient(135deg, #f8fafc, #f1f5f9);
            padding: 1.5rem;
            text-align: center;
            border-bottom: 1px solid #eef2f6;
        }

        .book-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #1e5a44, #2c7a5e);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .book-icon i {
            font-size: 2.5rem;
            color: white;
        }

        .book-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: #1e2a32;
            margin-bottom: 0.5rem;
        }

        .price-section {
            padding: 1.5rem;
            background: #ffffff;
            border-bottom: 1px solid #f0f4f8;
        }

        .price-amount {
            font-size: 2.8rem;
            font-weight: 800;
            color: #1e5a44;
        }

        .pay-button-wrapper {
            padding: 1.5rem;
        }

        .btn-pay {
            width: 100%;
            background: linear-gradient(135deg, #fb641b, #f4501b);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-pay:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 22px rgba(251, 100, 27, 0.4);
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1e5a44;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: white;
            font-size: 1rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="payment-container">
    <div class="brand-header">
        <h1><i class="fas fa-book-open"></i> Old Book Store</h1>
        <p>Secure checkout · Instant payment</p>
    </div>

    <div class="payment-card">
        <div class="book-preview">
            <div class="book-icon">
                <i class="fas fa-book"></i>
            </div>
            <div class="book-title">{{ book.title }}</div>
            <div class="book-author">{{ book.author }}</div>
        </div>

        <div class="price-section">
            <div class="price-amount">₹{{ book.price }}</div>
            <small>inclusive of all taxes</small>
        </div>

        <div class="pay-button-wrapper">
            <button class="btn-pay" id="pay-btn">
                <i class="fas fa-lock"></i> Pay ₹{{ book.price }}
            </button>
        </div>
    </div>
</div>

<div id="loadingOverlay" class="loading-overlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Processing payment...</div>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
    function showLoading() {
        document.getElementById('loadingOverlay').style.display = 'flex';
    }

    function hideLoading() {
        document.getElementById('loadingOverlay').style.display = 'none';
    }

    // Get delivery details from sessionStorage
    const deliveryAddress = sessionStorage.getItem('deliveryAddress') || 'Address not provided';
    const deliveryPhone = sessionStorage.getItem('deliveryPhone') || 'Not provided';
    const deliveryName = sessionStorage.getItem('deliveryName') || 'Customer';

    var options = {
        key: "{{ razorpay_key_id }}",
        amount: "{{ payment.amount }}",
        currency: "INR",
        name: "Old Book Store",
        description: "{{ book.title }}",
        order_id: "{{ payment.id }}",
        handler: function (response) {
            showLoading();
            
            // Save order to database after successful payment
            fetch('/save-order/', {
                method: 'POST',
                headers: {
                    'X-CSRFToken': getCSRFToken(),
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    book_id: {{ book.id }},
                    payment_id: response.razorpay_payment_id,
                    order_id: response.razorpay_order_id,
                    address: deliveryAddress,
                    phone: deliveryPhone,
                    recipient_name: deliveryName,
                    amount: {{ book.price }}
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    window.location.href = "/payment-success/{{ book.id }}/?payment_id=" + response.razorpay_payment_id;
                } else {
                    alert('Payment successful but order save failed. Please contact support.');
                    window.location.href = "/";
                }
            })
            .catch(error => {
                console.error('Error:', error);
                window.location.href = "/payment-success/{{ book.id }}/?payment_id=" + response.razorpay_payment_id;
            });
        },
        modal: {
            ondismiss: function() {
                hideLoading();
            }
        },
        theme: {
            color: "#1e5a44"
        }
    };

    var rzp1 = new Razorpay(options);

    document.getElementById("pay-btn").onclick = function(e) {
        rzp1.open();
        e.preventDefault();
    }

    function getCSRFToken() {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, 10) === 'csrftoken=') {
                    cookieValue = decodeURIComponent(cookie.substring(10));
                    break;
                }
            }
        }
        return cookieValue;
    }
</script>
</body>
</html>
